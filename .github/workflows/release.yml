name: Release

# Triggered by pushing a tag of the form `vX.Y.Z`. The tag is the single
# source of truth for the release version: every produced artifact (npm
# packages, VS Code extension .vsix, GitHub Release assets) is stamped with
# whatever version the tag carries.
#
# Workflow shape (modeled after gfx-rs/wgpu-native's cd.yml):
#   1. `build`  — fan out across (linux-x64, darwin-arm64, win32-x64),
#                 build the wgslpp + wgslpp-lsp release binaries on each
#                 native runner, and upload them as workflow artifacts.
#   2. `npm`    — gather the three platform artifacts, copy each into its
#                 npm/cli-<target>/bin/ slot, stamp the version, and
#                 publish the four packages (meta + 3 platforms) to npm.
#   3. `vscode` — for each platform, stage the matching wgslpp-lsp binary
#                 inside the extension dir and produce a platform-specific
#                 .vsix via vsce. Uploaded to the GitHub Release; marketplace
#                 publishing is gated on a manual decision for now (see
#                 commented-out vsce publish step).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard: refuse to release if the tag doesn't match the version in
  # crates/wgslpp-cli/Cargo.toml. Cargo.toml is the source of truth; the tag
  # is just the trigger. This prevents accidentally publishing artifacts
  # whose version disagrees with `cargo install` / `wgslpp --version`.
  check-version:
    name: Tag matches Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          cargo_version=$(awk -F\" '/^version = /{print $2; exit}' crates/wgslpp-cli/Cargo.toml)
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=> $tag) does not match Cargo.toml version $cargo_version"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm_dir: cli-linux-x64
            vsce_target: linux-x64
            cli_exe: wgslpp
            lsp_exe: wgslpp-lsp
          - target: aarch64-apple-darwin
            runner: macos-14
            npm_dir: cli-darwin-arm64
            vsce_target: darwin-arm64
            cli_exe: wgslpp
            lsp_exe: wgslpp-lsp
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm_dir: cli-win32-x64
            vsce_target: win32-x64
            cli_exe: wgslpp.exe
            lsp_exe: wgslpp-lsp.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build wgslpp + wgslpp-lsp
        run: cargo build --release --locked --target ${{ matrix.target }} -p wgslpp-cli -p wgslpp-lsp

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.cli_exe }} staging/
          cp target/${{ matrix.target }}/release/${{ matrix.lsp_exe }} staging/

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: staging/
          retention-days: 7

  npm:
    name: Publish npm packages
    needs: [check-version, build]
    runs-on: ubuntu-latest
    # Trusted publishing via OIDC: npm exchanges a short-lived GitHub OIDC
    # token for a publish credential at request time, so there's no
    # long-lived NPM_TOKEN in repo secrets. Each of the four packages
    # (`@polycam/wgslpp` plus the three platform packages) must have this
    # repo + workflow file configured as a trusted publisher on
    # npmjs.com — see RELEASING.md for the one-time bootstrap.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # node 24 ships npm ≥ 11.5.1, which is the minimum that knows
          # how to do the trusted-publishing OIDC exchange. node 22 only
          # ships npm 10.x — provenance signing still works there
          # (sigstore is a separate path), but the actual publish PUT
          # silently falls back to token auth and fails with a misleading
          # 404 against the registry.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage platform binaries into npm dirs
        run: |
          set -euo pipefail
          install -m 0755 artifacts/bin-x86_64-unknown-linux-gnu/wgslpp     npm/cli-linux-x64/bin/wgslpp
          install -m 0755 artifacts/bin-aarch64-apple-darwin/wgslpp         npm/cli-darwin-arm64/bin/wgslpp
          install -m 0755 artifacts/bin-x86_64-pc-windows-msvc/wgslpp.exe   npm/cli-win32-x64/bin/wgslpp.exe

      - name: Stamp version into all package.json files
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          for pkg in npm/cli npm/cli-darwin-arm64 npm/cli-linux-x64 npm/cli-win32-x64; do
            PKG_PATH="$pkg/package.json" node -e "
              const fs = require('fs');
              const path = process.env.PKG_PATH;
              const pkgJson = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkgJson.version = process.env.VERSION;
              if (pkgJson.optionalDependencies) {
                for (const k of Object.keys(pkgJson.optionalDependencies)) {
                  pkgJson.optionalDependencies[k] = process.env.VERSION;
                }
              }
              fs.writeFileSync(path, JSON.stringify(pkgJson, null, 2) + '\n');
            "
          done

      # `--provenance` ships the SLSA attestation that trusted publishing
      # produces for free. Platform packages first so the meta package's
      # optionalDependencies resolve at publish time.
      - name: Publish platform packages
        run: |
          set -euo pipefail
          for pkg in npm/cli-darwin-arm64 npm/cli-linux-x64 npm/cli-win32-x64; do
            ( cd "$pkg" && npm publish --access public --provenance )
          done

      - name: Publish meta package
        run: ( cd npm/cli && npm publish --access public --provenance )

  vscode:
    name: Build VS Code extension (${{ matrix.vsce_target }})
    needs: [check-version, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: bin-x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            lsp_exe: wgslpp-lsp
          - artifact: bin-aarch64-apple-darwin
            vsce_target: darwin-arm64
            lsp_exe: wgslpp-lsp
          - artifact: bin-x86_64-pc-windows-msvc
            vsce_target: win32-x64
            lsp_exe: wgslpp-lsp.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/

      - name: Stage LSP binary inside extension
        run: |
          set -euo pipefail
          mkdir -p wgslpp-vscode/bin
          install -m 0755 "artifacts/${{ matrix.lsp_exe }}" "wgslpp-vscode/bin/${{ matrix.lsp_exe }}"

      - name: Stamp extension version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const p = 'wgslpp-vscode/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "

      - name: Install + compile + package
        working-directory: wgslpp-vscode
        run: |
          corepack enable
          yarn install --immutable
          yarn compile
          # `--no-dependencies` skips vsce's prod-dep walking, which
          # auto-detects yarn from yarn.lock and tries to invoke
          # `yarn list --prod --json` — a Yarn 1 command that Yarn 4
          # doesn't ship. Our `yarn install` has already populated
          # node_modules, so vsce just bundles what's there.
          npx --yes @vscode/vsce package --no-dependencies --target ${{ matrix.vsce_target }} -o "../wgslpp-${{ matrix.vsce_target }}.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: wgslpp-${{ matrix.vsce_target }}.vsix
          retention-days: 7

      # Uncomment once you're ready to push to the marketplace from CI:
      # - name: Publish to marketplace
      #   working-directory: wgslpp-vscode
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: npx --yes @vscode/vsce publish --packagePath "../wgslpp-${{ matrix.vsce_target }}.vsix"

  release:
    name: Create GitHub Release
    needs: [npm, vscode]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          set -euo pipefail
          mkdir -p out
          # Raw binaries (handy for users who don't want npm)
          for d in artifacts/bin-*; do
            target="${d##*/bin-}"
            ( cd "$d" && tar czf "../../out/wgslpp-$target.tar.gz" -- * )
          done
          cp artifacts/vsix-*/wgslpp-*.vsix out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
